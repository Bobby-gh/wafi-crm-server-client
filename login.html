<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WAFI CAPITAL — Connexion</title>
<style>
  :root{
    --navy-950:#0a1830; --navy-900:#0e2340; --navy-800:#16325c;
    --gold-500:#c9a227; --gold-400:#dab94a;
    --paper:#f6f4ee; --ink:#1c2430; --ink-soft:#5b6472; --line:#d8d2c0;
    --red:#9a3b3b; --red-bg:#f5e2e2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;background:var(--paper);
    display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);
  }
  .card{
    width:100%;max-width:380px;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:32px 30px;box-shadow:0 20px 50px rgba(10,24,48,.12);
  }
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-500);font-weight:700;margin:0 0 8px;}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:22px;margin:0 0 4px;color:var(--navy-950);}
  .sub{font-size:12.5px;color:var(--ink-soft);margin:0 0 24px;}
  label{display:block;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:5px;}
  input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;font-size:14px;background:var(--paper);color:var(--ink);margin-bottom:16px;}
  input:focus{outline:2px solid var(--navy-800);outline-offset:1px;}
  button{
    width:100%;padding:11px;border:none;border-radius:7px;background:var(--navy-900);
    color:var(--gold-400);font-size:14px;font-weight:700;cursor:pointer;
  }
  button:hover{background:var(--navy-800);}
  button:disabled{opacity:.6;cursor:default;}
  .error{
    display:none;background:var(--red-bg);color:var(--red);font-size:12.5px;
    padding:9px 12px;border-radius:6px;margin-bottom:16px;
  }
  .error.show{display:block;}
  .footer{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:20px;}
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">WAFI CAPITAL S.A. · SICAV — BRVM</p>
  <h1>Registre Clientèle</h1>
  <p class="sub">Connectez-vous avec votre identifiant pour accéder au registre.</p>
  <div class="error" id="errorBox"></div>
  <form id="loginForm">
    <label for="username">Identifiant</label>
    <input type="text" id="username" autocomplete="username" required>
    <label for="password">Mot de passe</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit" id="submitBtn">Se connecter</button>
  </form>
  <p class="footer">Accès réservé aux utilisateurs autorisés de WAFI CAPITAL.</p>
</div>
<script>
const form = document.getElementById('loginForm');
const errorBox = document.getElementById('errorBox');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Connexion…';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      errorBox.textContent = data.error || 'Connexion impossible.';
      errorBox.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Se connecter';
      return;
    }
    window.location.href = '/';
  } catch (err) {
    errorBox.textContent = 'Erreur réseau — veuillez réessayer.';
    errorBox.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Se connecter';
  }
});
</script>
</body>
</html>
